<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secret Access</title>
<style>
body {
    background: linear-gradient(135deg,#1b1f3a,#2b2f55);
    color: white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.box {
    text-align:center;
    background:rgba(255,255,255,0.1);
    padding:30px;
    border-radius:20px;
}

input {
    padding:10px;
    border-radius:10px;
    border:none;
    margin-top:10px;
}

button {
    margin-top:10px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#ff6fae;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2>🔐 Enter Password</h2>
    <input type="password" id="pass">
    <br>
    <button onclick="check()">Unlock</button>
</div>

<script>
function check(){
    let p = document.getElementById("pass").value;

    if(p === "supaporn"){
        window.location.href = "home.html";
    } else {
        alert("Wrong password 🤍");
    }
}
</script>

</body>
</html>
